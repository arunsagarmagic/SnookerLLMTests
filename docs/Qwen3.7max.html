<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooker Scorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d3320 0%, #1a6b40 50%, #0d3320 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Player Setup */
        .player-setup {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-setup h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .player-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255,255,255,0.95);
            color: #333;
        }

        input[type="text"]:focus {
            outline: 2px solid #667eea;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60, #1e8449);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
        }

        .btn-undo {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }

        .btn-undo:hover {
            transform: translateY(-2px);
        }

        /* Score Display */
        .score-display {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .score-display.active {
            display: block;
        }

        .players-scores {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .player-score-card {
            text-align: center;
            padding: 25px;
            border-radius: 15px;
            transition: all 0.3s;
            position: relative;
        }

        .player-score-card.player1 {
            background: linear-gradient(135deg, rgba(231,76,60,0.2), rgba(231,76,60,0.1));
            border: 3px solid rgba(231,76,60,0.5);
        }

        .player-score-card.player2 {
            background: linear-gradient(135deg, rgba(52,152,219,0.2), rgba(52,152,219,0.1));
            border: 3px solid rgba(52,152,219,0.5);
        }

        .player-score-card.active {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            border-width: 4px;
        }

        .player-score-card.active::after {
            content: '▶';
            position: absolute;
            top: -15px;
            right: 20px;
            font-size: 24px;
        }

        .player-name {
            font-size: 1.5em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .player-score {
            font-size: 4em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .player-break {
            font-size: 1.2em;
            opacity: 0.9;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Ball Interface */
        .ball-interface {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .ball-interface.active {
            display: block;
        }

        .current-player-indicator {
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 20px;
            font-weight: bold;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .balls-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
        }

        .ball {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            user-select: none;
        }

        .ball::before {
            content: '';
            position: absolute;
            width: 35%;
            height: 35%;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            top: 12%;
            left: 18%;
            filter: blur(2px);
        }

        .ball::after {
            content: '';
            position: absolute;
            width: 15%;
            height: 15%;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            top: 10%;
            left: 22%;
        }

        .ball:hover:not(.disabled) {
            transform: scale(1.15) rotate(5deg);
        }

        .ball:active:not(.disabled) {
            transform: scale(0.9);
        }

        .ball.disabled {
            opacity: 0.25;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .ball.red {
            background: radial-gradient(circle at 35% 35%, #ff8a80, #e53935 40%, #b71c1c 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.4),
                inset 5px 5px 10px rgba(255,255,255,0.2),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(229,57,53,0.5);
        }

        .ball.yellow {
            background: radial-gradient(circle at 35% 35%, #fff9c4, #fdd835 40%, #f9a825 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.3),
                inset 5px 5px 10px rgba(255,255,255,0.3),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(253,216,53,0.5);
        }

        .ball.green {
            background: radial-gradient(circle at 35% 35%, #a5d6a7, #43a047 40%, #1b5e20 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.4),
                inset 5px 5px 10px rgba(255,255,255,0.2),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(67,160,71,0.5);
        }

        .ball.brown {
            background: radial-gradient(circle at 35% 35%, #bcaaa4, #8d6e63 40%, #4e342e 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.5),
                inset 5px 5px 10px rgba(255,255,255,0.15),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(141,110,99,0.5);
        }

        .ball.blue {
            background: radial-gradient(circle at 35% 35%, #90caf9, #1e88e5 40%, #0d47a1 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.4),
                inset 5px 5px 10px rgba(255,255,255,0.2),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(30,136,229,0.5);
        }

        .ball.pink {
            background: radial-gradient(circle at 35% 35%, #f8bbd9, #e91e63 40%, #880e4f 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.4),
                inset 5px 5px 10px rgba(255,255,255,0.2),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(233,30,99,0.5);
        }

        .ball.black {
            background: radial-gradient(circle at 35% 35%, #616161, #212121 40%, #000000 100%);
            box-shadow: 
                inset -15px -15px 30px rgba(0,0,0,0.6),
                inset 5px 5px 10px rgba(255,255,255,0.1),
                0 8px 20px rgba(0,0,0,0.5),
                0 0 10px rgba(33,33,33,0.8);
        }

        .ball-count {
            position: absolute;
            top: -12px;
            right: -12px;
            background: linear-gradient(135deg, #fff, #eee);
            color: #333;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            border: 2px solid rgba(0,0,0,0.2);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .game-status {
            text-align: center;
            font-size: 1.4em;
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, rgba(39,174,96,0.3), rgba(39,174,96,0.1));
            border-radius: 12px;
            border: 2px solid rgba(39,174,96,0.5);
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* History */
        .history-panel {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
            max-height: 500px;
            overflow-y: auto;
        }

        .history-panel.active {
            display: block;
        }

        .history-panel h3 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .history-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            border-left: 5px solid;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.12);
        }

        .history-item.player1 {
            border-left-color: #e74c3c;
        }

        .history-item.player2 {
            border-left-color: #3498db;
        }

        .history-item.info {
            border-left-color: #f39c12;
        }

        .history-item strong {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .history-item .details {
            font-size: 0.85em;
            opacity: 0.7;
            display: flex;
            gap: 15px;
        }

        .history-empty {
            text-align: center;
            opacity: 0.5;
            padding: 20px;
        }

        /* Table info bar */
        .table-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            flex-wrap: wrap;
        }

        .table-info-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mini-ball {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            
            .player-inputs, .players-scores {
                grid-template-columns: 1fr;
            }

            .ball {
                width: 65px;
                height: 65px;
                font-size: 17px;
            }

            .player-score {
                font-size: 3em;
            }

            .game-status {
                font-size: 1.1em;
            }

            .table-info {
                gap: 15px;
            }
        }

        /* Scrollbar */
        .history-panel::-webkit-scrollbar {
            width: 8px;
        }

        .history-panel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        .history-panel::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }

        .history-panel::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎱 Snooker Scorer</h1>

        <!-- Player Setup -->
        <div class="player-setup" id="playerSetup">
            <h2>🏆 New Match</h2>
            <div class="player-inputs">
                <input type="text" id="player1Name" placeholder="Player 1 Name">
                <input type="text" id="player2Name" placeholder="Player 2 Name">
            </div>
            <button class="btn btn-primary" onclick="gameController.startGame()">Start Game</button>
        </div>

        <!-- Score Display -->
        <div class="score-display" id="scoreDisplay">
            <div class="players-scores">
                <div class="player-score-card player1" id="player1Card">
                    <div class="player-name" id="player1NameDisplay">Player 1</div>
                    <div class="player-score" id="player1Score">0</div>
                    <div class="player-break">Break: <span id="player1Break">0</span></div>
                </div>
                <div class="player-score-card player2" id="player2Card">
                    <div class="player-name" id="player2NameDisplay">Player 2</div>
                    <div class="player-score" id="player2Score">0</div>
                    <div class="player-break">Break: <span id="player2Break">0</span></div>
                </div>
            </div>
        </div>

        <!-- Ball Interface -->
        <div class="ball-interface" id="ballInterface">
            <div class="current-player-indicator" id="currentPlayerIndicator">
                🎯 Current Turn: <span id="currentPlayerName">Player 1</span>
            </div>

            <div class="table-info" id="tableInfo"></div>

            <div class="balls-container" id="ballsContainer"></div>

            <div class="game-status" id="gameStatus">
                Pot a RED ball to start
            </div>

            <div class="action-buttons">
                <button class="btn btn-undo" onclick="gameController.undoLastAction()">↩ Undo</button>
                <button class="btn btn-danger" onclick="gameController.endBreak()">⏭ End Break (Foul/Miss)</button>
                <button class="btn btn-success" onclick="gameController.endFrame()">🔄 New Frame</button>
                <button class="btn btn-primary" onclick="gameController.newGame()">🆕 New Game</button>
            </div>
        </div>

        <!-- History -->
        <div class="history-panel" id="historyPanel">
            <h3>📋 Game History</h3>
            <div id="historyList">
                <div class="history-empty">No actions yet. Start potting balls!</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // DATABASE ABSTRACTION LAYER
        // Clean interface so a real DB (PostgreSQL, MongoDB, etc.)
        // can be plugged in later by implementing the same interface.
        // ============================================
        class DatabaseAdapter {
            constructor() {
                this.db = null;
                this.dbName = 'snookerScorer';
                this.version = 1;
            }

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve();
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        
                        if (!db.objectStoreNames.contains('games')) {
                            const gameStore = db.createObjectStore('games', { keyPath: 'id' });
                            gameStore.createIndex('timestamp', 'timestamp', { unique: false });
                            gameStore.createIndex('status', 'status', { unique: false });
                        }

                        if (!db.objectStoreNames.contains('actions')) {
                            const actionStore = db.createObjectStore('actions', { keyPath: 'id', autoIncrement: true });
                            actionStore.createIndex('gameId', 'gameId', { unique: false });
                            actionStore.createIndex('timestamp', 'timestamp', { unique: false });
                        }
                    };
                });
            }

            async create(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.add(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async read(storeName, id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.get(id);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async readAll(storeName) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async update(storeName, data) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.put(data);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async remove(storeName, id) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readwrite');
                    const store = transaction.objectStore(storeName);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            async query(storeName, indexName, value) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readonly');
                    const store = transaction.objectStore(storeName);
                    const index = store.index(indexName);
                    const request = index.getAll(value);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            // Count last N items in store (for undo/history)
            async getLast(storeName, n = 1) {
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([storeName], 'readonly');
                    const store = transaction.objectStore(storeName);
                    const request = store.openCursor(null, 'prev');
                    const results = [];
                    let count = 0;
                    request.onsuccess = (event) => {
                        const cursor = event.target.result;
                        if (cursor && count < n) {
                            results.push(cursor.value);
                            count++;
                            cursor.continue();
                        } else {
                            resolve(results);
                        }
                    };
                    request.onerror = () => reject(request.error);
                });
            }
        }

        // ============================================
        // GAME STATE
        // ============================================
        class GameState {
            constructor(player1Name, player2Name) {
                this.id = 'game_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
                this.player1Name = player1Name;
                this.player2Name = player2Name;
                this.player1Score = 0;
                this.player2Score = 0;
                this.player1Frames = 0;
                this.player2Frames = 0;
                this.currentPlayer = 1;
                this.currentBreak = 0;
                this.breaks = { player1: [], player2: [] };
                this.ballsOnTable = {
                    red: 15,
                    yellow: 1,
                    green: 1,
                    brown: 1,
                    blue: 1,
                    pink: 1,
                    black: 1
                };
                this.lastPottedWasRed = false;
                this.frameNumber = 1;
                this.status = 'in_progress';
                this.createdAt = Date.now();
                this.updatedAt = Date.now();
            }

            static BALL_POINTS = {
                red: 1,
                yellow: 2,
                green: 3,
                brown: 4,
                blue: 5,
                pink: 6,
                black: 7
            };

            static COLOR_ORDER = ['yellow', 'green', 'brown', 'blue', 'pink', 'black'];

            getBallPoints(ballType) {
                return GameState.BALL_POINTS[ballType];
            }

            getAvailableBalls() {
                const available = [];
                const redsLeft = this.ballsOnTable.red;

                if (redsLeft > 0) {
                    if (!this.lastPottedWasRed) {
                        // Need to pot a red
                        available.push('red');
                    } else {
                        // Need to pot a color (any remaining)
                        GameState.COLOR_ORDER.forEach(color => {
                            if (this.ballsOnTable[color] > 0) {
                                available.push(color);
                            }
                        });
                    }
                } else {
                    // All reds gone - pot colors in ascending order
                    for (const color of GameState.COLOR_ORDER) {
                        if (this.ballsOnTable[color] > 0) {
                            available.push(color);
                            break; // only the lowest remaining color is available
                        }
                    }
                }

                return available;
            }

            canPotBall(ballType) {
                return this.getAvailableBalls().includes(ballType);
            }

            potBall(ballType) {
                const points = this.getBallPoints(ballType);

                if (ballType === 'red') {
                    this.ballsOnTable.red--;
                    this.lastPottedWasRed = true;
                } else {
                    this.ballsOnTable[ballType] = 0;
                    if (this.ballsOnTable.red > 0) {
                        // Color gets respotted when reds remain
                        this.ballsOnTable[ballType] = 1;
                        // Wait - colors are potted and then respotted while reds remain
                        // So we mark that the color is available again
                    }
                    this.lastPottedWasRed = false;
                }

                if (this.currentPlayer === 1) {
                    this.player1Score += points;
                } else {
                    this.player2Score += points;
                }

                this.currentBreak += points;
                this.updatedAt = Date.now();

                return { points, score: this.currentPlayer === 1 ? this.player1Score : this.player2Score };
            }

            endBreak(reason = 'foul_or_miss') {
                const breakScore = this.currentBreak;
                if (breakScore > 0) {
                    const pKey = this.currentPlayer === 1 ? 'player1' : 'player2';
                    this.breaks[pKey].push(breakScore);
                }
                this.currentBreak = 0;
                this.currentPlayer = this.currentPlayer === 1 ? 2 : 1;
                this.lastPottedWasRed = false;
                this.updatedAt = Date.now();
                return breakScore;
            }

            endFrame() {
                const breakScore = this.currentBreak;
                if (breakScore > 0) {
                    const pKey = this.currentPlayer === 1 ? 'player1' : 'player2';
                    this.breaks[pKey].push(breakScore);
                }

                const winner = this.player1Score > this.player2Score ? 1 
                    : this.player1Score < this.player2Score ? 2 : 0;
                
                if (winner === 1) this.player1Frames++;
                else if (winner === 2) this.player2Frames++;

                this.currentBreak = 0;
                this.frameNumber++;
                this.lastPottedWasRed = false;
                this.player1Score = 0;
                this.player2Score = 0;
                this.currentPlayer = 1;
                this.ballsOnTable = {
                    red: 15, yellow: 1, green: 1,
                    brown: 1, blue: 1, pink: 1, black: 1
                };
                this.updatedAt = Date.now();

                return { winner, frameScore: `${this.player1Score}-${this.player2Score}` };
            }

            getStatusMessage() {
                const redsLeft = this.ballsOnTable.red;

                if (redsLeft > 0) {
                    if (!this.lastPottedWasRed) {
                        return `🔴 Pot a RED ball (${redsLeft} reds remaining)`;
                    } else {
                        return `🎨 Pot any COLOR ball (then it respots)`;
                    }
                } else {
                    // Find next color in sequence
                    for (const color of GameState.COLOR_ORDER) {
                        if (this.ballsOnTable[color] > 0) {
                            return `🎱 Pot the ${color.toUpperCase()} ball (${this.getBallPoints(color)} pts) — next in sequence`;
                        }
                    }
                    return `🏁 Frame complete! Press "New Frame" to continue.`;
                }
            }

            isFrameOver() {
                if (this.ballsOnTable.red > 0) return false;
                return GameState.COLOR_ORDER.every(c => this.ballsOnTable[c] === 0);
            }
        }

        // ============================================
        // GAME CONTROLLER
        // ============================================
        class GameController {
            constructor() {
                this.db = new DatabaseAdapter();
                this.gameState = null;
                this.history = []; // in-memory cache of current game's actions
                this.initialized = false;
            }

            async init() {
                await this.db.init();
                this.initialized = true;
                console.log('✅ Database initialized');
            }

            async startGame() {
                const player1Name = document.getElementById('player1Name').value.trim() || 'Player 1';
                const player2Name = document.getElementById('player2Name').value.trim() || 'Player 2';

                this.gameState = new GameState(player1Name, player2Name);
                this.history = [];

                await this.db.create('games', this.gameState);
                await this._recordAction('game_started', {
                    player1Name,
                    player2Name,
                    message: `Match started: ${player1Name} vs ${player2Name}`
                }, 'info');

                this.updateUI();
                this.showGameInterface();
            }

            async potBall(ballType) {
                if (!this.gameState || !this.gameState.canPotBall(ballType)) {
                    return;
                }

                const beforeState = JSON.parse(JSON.stringify(this.gameState));
                const result = this.gameState.potBall(ballType);
                const points = this.gameState.getBallPoints(ballType);

                const playerName = this.gameState.currentPlayer === 1 
                    ? this.gameState.player1Name 
                    : this.gameState.player2Name;

                await this._recordAction('ball_potted', {
                    player: this.gameState.currentPlayer,
                    playerName,
                    ball: ballType,
                    points,
                    newScore: result.score,
                    break: this.gameState.currentBreak,
                    beforeState
                }, `player${this.gameState.currentPlayer}`);

                await this.db.update('games', this.gameState);
                this.updateUI();

                if (this.gameState.isFrameOver()) {
                    setTimeout(() => this.endFrame(), 500);
                }
            }

            async endBreak(reason = 'foul_or_miss') {
                if (!this.gameState || this.gameState.currentBreak === 0 && reason !== 'foul_or_miss') return;

                const beforeState = JSON.parse(JSON.stringify(this.gameState));
                const playerName = this.gameState.currentPlayer === 1 
                    ? this.gameState.player1Name 
                    : this.gameState.player2Name;
                const breakScore = this.gameState.endBreak(reason);

                await this._recordAction('break_ended', {
                    player: this.gameState.currentPlayer === 1 ? 2 : 1, // previous player
                    playerName,
                    breakScore,
                    reason,
                    beforeState
                }, `player${this.gameState.currentPlayer === 1 ? 2 : 1}`);

                await this.db.update('games', this.gameState);
                this.updateUI();
            }

            async endFrame() {
                if (!this.gameState) return;

                const beforeState = JSON.parse(JSON.stringify(this.gameState));
                const prevP1 = this.gameState.player1Score;
                const prevP2 = this.gameState.player2Score;
                const breakScore = this.gameState.currentBreak;
                const playerName = this.gameState.currentPlayer === 1 
                    ? this.gameState.player1Name 
                    : this.gameState.player2Name;

                // Determine winner before resetting
                const winner = prevP1 > prevP2 ? 1 : prevP1 < prevP2 ? 2 : 0;
                const winnerName = winner === 1 ? this.gameState.player1Name 
                    : winner === 2 ? this.gameState.player2Name : 'Draw';

                this.gameState.endFrame();

                await this._recordAction('frame_ended', {
                    frameNumber: this.gameState.frameNumber - 1,
                    scoreP1: prevP1,
                    scoreP2: prevP2,
                    winner,
                    winnerName,
                    lastBreak: breakScore,
                    beforeState
                }, 'info');

                await this.db.update('games', this.gameState);
                this.updateUI();
            }

            async undoLastAction() {
                if (!this.gameState || this.history.length === 0) {
                    alert('Nothing to undo.');
                    return;
                }

                const lastAction = this.history[this.history.length - 1];
                
                if (lastAction.data.beforeState) {
                    this.gameState = Object.assign(new GameState('', ''), lastAction.data.beforeState);
                    await this.db.update('games', this.gameState);
                }

                // Remove from DB
                if (lastAction.dbId) {
                    await this.db.remove('actions', lastAction.dbId);
                }
                this.history.pop();

                this.updateUI();
            }

            async _recordAction(type, data, displayType = 'info') {
                const action = {
                    gameId: this.gameState.id,
                    type,
                    displayType,
                    data,
                    timestamp: Date.now()
                };

                const dbId = await this.db.create('actions', action);
                action.dbId = dbId;
                this.history.push(action);
            }

            showGameInterface() {
                document.getElementById('playerSetup').style.display = 'none';
                document.getElementById('scoreDisplay').classList.add('active');
                document.getElementById('ballInterface').classList.add('active');
                document.getElementById('historyPanel').classList.add('active');
            }

            updateUI() {
                if (!this.gameState) return;

                const gs = this.gameState;

                // Scores
                document.getElementById('player1NameDisplay').textContent = gs.player1Name;
                document.getElementById('player2NameDisplay').textContent = gs.player2Name;
                document.getElementById('player1Score').textContent = gs.player1Score;
                document.getElementById('player2Score').textContent = gs.player2Score;
                document.getElementById('player1Break').textContent = gs.currentPlayer === 1 ? gs.currentBreak : 0;
                document.getElementById('player2Break').textContent = gs.currentPlayer === 2 ? gs.currentBreak : 0;

                // Active player highlight
                document.getElementById('player1Card').classList.toggle('active', gs.currentPlayer === 1);
                document.getElementById('player2Card').classList.toggle('active', gs.currentPlayer === 2);

                // Current player name
                const currentPlayerName = gs.currentPlayer === 1 ? gs.player1Name : gs.player2Name;
                document.getElementById('currentPlayerName').textContent = currentPlayerName;

                // Status message
                document.getElementById('gameStatus').textContent = gs.getStatusMessage();

                // Table info
                this._renderTableInfo();

                // Balls
                this._renderBalls();

                // History
                this._renderHistory();
            }

            _renderTableInfo() {
                const container = document.getElementById('tableInfo');
                const gs = this.gameState;
                container.innerHTML = `
                    <div class="table-info-item">
                        <span class="mini-ball" style="background:radial-gradient(circle at 35% 35%, #ff8a80, #b71c1c);"></span>
                        <span>Reds: <strong>${gs.ballsOnTable.red}</strong></span>
                    </div>
                    <div class="table-info-item">
                        <span>Frame: <strong>${gs.frameNumber}</strong></span>
                    </div>
                    <div class="table-info-item">
                        <span>Frames won: <strong style="color:#e74c3c">${gs.player1Frames}</strong> - <strong style="color:#3498db">${gs.player2Frames}</strong></span>
                    </div>
                `;
            }

            _renderBalls() {
                const container = document.getElementById('ballsContainer');
                container.innerHTML = '';

                const gs = this.gameState;
                const availableBalls = gs.getAvailableBalls();
                const ballTypes = ['red', 'yellow', 'green', 'brown', 'blue', 'pink', 'black'];

                ballTypes.forEach(ballType => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${ballType}`;
                    const count = gs.ballsOnTable[ballType];
                    const isAvailable = availableBalls.includes(ballType);

                    if (!isAvailable || count === 0) {
                        ball.classList.add('disabled');
                    }

                    ball.onclick = () => {
                        if (isAvailable && count > 0) {
                            this.potBall(ballType);
                        }
                    };

                    // Count badge for red balls
                    if (ballType === 'red' && count > 0) {
                        const countBadge = document.createElement('div');
                        countBadge.className = 'ball-count';
                        countBadge.textContent = count;
                        ball.appendChild(countBadge);
                    }

                    // Ball value label
                    const label = document.createElement('span');
                    label.textContent = gs.getBallPoints(ballType);
                    ball.appendChild(label);

                    container.appendChild(ball);
                });
            }

            _renderHistory() {
                const list = document.getElementById('historyList');
                list.innerHTML = '';

                if (this.history.length === 0) {
                    list.innerHTML = '<div class="history-empty">No actions yet. Start potting balls!</div>';
                    return;
                }

                // Show in reverse chronological order (most recent first)
                [...this.history].reverse().slice(0, 50).forEach(action => {
                    const item = document.createElement('div');
                    item.className = `history-item ${action.displayType}`;

                    const time = new Date(action.timestamp).toLocaleTimeString();
                    let desc = '';
                    let details = '';

                    if (action.type === 'ball_potted') {
                        const emoji = action.data.ball === 'red' ? '🔴' : 
                            {yellow:'🟡', green:'🟢', brown:'🟤', blue:'🔵', pink:'🌸', black:'⚫'}[action.data.ball];
                        desc = `${action.data.playerName} potted ${emoji} ${action.data.ball.toUpperCase()} (+${action.data.points})`;
                        details = `Score: ${action.data.newScore} | Break: ${action.data.break} | ${time}`;
                    } else if (action.type === 'break_ended') {
                        desc = `${action.data.playerName} ended break (scored ${action.data.breakScore})`;
                        details = `${time}`;
                    } else if (action.type === 'frame_ended') {
                        desc = `Frame ${action.data.frameNumber}: ${action.data.winnerName} wins (${action.data.scoreP1}-${action.data.scoreP2})`;
                        details = `${time}`;
                    } else if (action.type === 'game_started') {
                        desc = `🏁 ${action.data.message}`;
                        details = `${time}`;
                    }

                    item.innerHTML = `
                        <strong>${desc}</strong>
                        <div class="details">${details}</div>
                    `;
                    list.appendChild(item);
                });
            }

            async newGame() {
                if (this.gameState && !confirm('Start a new match? Current match will be saved.')) {
                    return;
                }
                this.gameState = null;
                this.history = [];

                document.getElementById('playerSetup').style.display = 'block';
                document.getElementById('scoreDisplay').classList.remove('active');
                document.getElementById('ballInterface').classList.remove('active');
                document.getElementById('historyPanel').classList.remove('active');
                document.getElementById('player1Name').value = '';
                document.getElementById('player2Name').value = '';
            }
        }

        // ============================================
        // BOOTSTRAP
        // ============================================
        const gameController = new GameController();
        gameController.init().catch(err => console.error('DB init failed:', err));
    </script>
</body>
