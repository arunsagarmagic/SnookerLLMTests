<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProSnooker Scoreboard</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --text-color: #eee;
            --accent-color: #4CAF50;
            --danger-color: #f44336;
            --ball-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 5px 5px 10px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #app {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* --- SETUP SCREEN --- */
        .card {
            background: var(--panel-color);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 12px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }

        button {
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 5px;
            border: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger-color); color: white; }

        /* --- GAME SCREEN --- */
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 20px;
            background: #000;
            border-radius: 10px;
            border: 2px solid #444;
        }

        .player-box {
            flex: 1;
            padding: 10px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .player-box.active {
            background: rgba(76, 175, 80, 0.2);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .player-name { font-size: 1.2rem; margin-bottom: 5px; }
        .player-score { font-size: 3rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; }

        /* --- BALLS GRID --- */
        .balls-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .ball {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: var(--ball-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: rgba(0,0,0,0.5);
            user-select: none;
        }

        .ball:active { transform: scale(0.9); }

        /* Ball Colors */
        .ball-red    { background: radial-gradient(circle at 30% 30%, #ff5f5f, #8b0000); }
        .ball-yellow { background: radial-gradient(circle at 30% 30%, #ffff66, #b3b300); }
        .ball-green  { background: radial-gradient(circle at 30% 30%, #66ff66, #006600); }
        .ball-brown  { background: radial-gradient(circle at 30% 30%, #a67c52, #4d3319); }
        .ball-blue   { background: radial-gradient(circle at 30% 30%, #66a3ff, #003366); }
        .ball-pink   { background: radial-gradient(circle at 30% 30%, #ff66cc, #80004d); }
        .ball-black  { background: radial-gradient(circle at 30% 30%, #444, #000); color: #fff; }

        .controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }

        /* --- HISTORY --- */
        .history-list {
            text-align: left;
            max-width: 400px;
            margin: 0 auto;
        }
        .history-item {
            background: var(--panel-color);
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Setup View -->
    <div id="setup-view" class="card">
        <h1>🎱 Snooker Score</h1>
        <input type="text" id="p1-name" placeholder="Player 1 Name" value="Player 1">
        <input type="text" id="p2-name" placeholder="Player 2 Name" value="Player 2">
        <button class="btn-primary" onclick="GameUI.initGame()">Start Game</button>
        <div style="margin-top: 20px;">
            <button onclick="GameUI.showHistory()">View History</button>
        </div>
    </div>

    <!-- Game View -->
    <div id="game-view" class="hidden">
        <div class="scoreboard">
            <div id="box-0" class="player-box active">
                <div id="name-0" class="player-name">P1</div>
                <div id="score-0" class="player-score">0</div>
            </div>
            <div id="box-1" class="player-box">
                <div id="name-1" class="player-name">P2</div>
                <div id="score-1" class="player-score">0</div>
            </div>
        </div>

        <div class="balls-grid">
            <div class="ball ball-red" onclick="GameUI.addScore(1)">1</div>
            <div class="ball ball-yellow" onclick="GameUI.addScore(2)">2</div>
            <div class="ball ball-green" onclick="GameUI.addScore(3)">3</div>
            <div class="ball ball-brown" onclick="GameUI.addScore(4)">4</div>
            <div class="ball ball-blue" onclick="GameUI.addScore(5)">5</div>
            <div class="ball ball-pink" onclick="GameUI.addScore(6)">6</div>
            <div class="ball ball-black" onclick="GameUI.addScore(7)">7</div>
        </div>

        <div class="controls">
            <button class="btn-danger" onclick="GameUI.undo()">Undo</button>
            <button class="btn-primary" onclick="GameUI.switchTurn()">Switch Turn ⇄</button>
            <button class="btn-danger" onclick="GameUI.endGame()">End Frame</button>
        </div>
    </div>

    <!-- History View -->
    <div id="history-view" class="card hidden">
        <h2>Match History</h2>
        <div id="history-list" class="history-list"></div>
        <button class="btn-primary" style="margin-top: 20px;" onclick="GameUI.showSetup()">Back</button>
    </div>
</div>

<script>
/** 
 * DATA LAYER: Database API
 * This abstracts IndexedDB. To swap with a REST API or Firebase, 
 * only this class needs to be modified.
 */
class DbService {
    constructor() {
        this.dbName = "SnookerDB";
        this.storeName = "games";
        this.db = null;
    }

    async open() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.dbName, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                db.createObjectStore(this.storeName, { keyPath: "id", autoIncrement: true });
            };
            request.onsuccess = (e) => {
                this.db = e.target.result;
                resolve();
            };
            request.onerror = (e) => reject("DB Error: " + e.target.errorCode);
        });
    }

    async saveGame(gameData) {
        const tx = this.db.transaction(this.storeName, "readwrite");
        const store = tx.objectStore(this.storeName);
        return store.add(gameData);
    }

    async getAllGames() {
        return new Promise((resolve) => {
            const tx = this.db.transaction(this.storeName, "readonly");
            const store = tx.objectStore(this.storeName);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
        });
    }
}

/**
 * LOGIC LAYER: Game State Management
 */
class SnookerGame {
    constructor() {
        this.players = [];
        this.scores = [0, 0];
        this.activePlayerIndex = 0;
        this.history = []; // Tracks sequence of scores for undo
    }

    setup(p1, p2) {
        this.players = [p1, p2];
        this.scores = [0, 0];
        this.activePlayerIndex = 0;
        this.history = [];
    }

    addPoints(points) {
        this.history.push({
            player: this.activePlayerIndex,
            points: points
        });
        this.scores[this.activePlayerIndex] += points;
    }

    undo() {
        const last = this.history.pop();
        if (last) {
            this.scores[last.player] -= last.points;
        }
    }

    switchTurn() {
        this.activePlayerIndex = this.activePlayerIndex === 0 ? 1 : 0;
    }

    getData() {
        return {
            players: this.players,
            finalScores: this.scores,
            date: new Date().toLocaleString()
        };
    }
}

/**
 * UI LAYER: DOM Manipulation
 */
const db = new DbService();
const game = new SnookerGame();

const GameUI = {
    async init() {
        await db.open();
    },

    showSetup() {
        document.getElementById('setup-view').classList.remove('hidden');
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('history-view').classList.add('hidden');
    },

    initGame() {
        const p1 = document.getElementById('p1-name').value || "Player 1";
        const p2 = document.getElementById('p2-name').value || "Player 2";
        
        game.setup(p1, p2);
        
        document.getElementById('name-0').innerText = p1;
        document.getElementById('name-1').innerText = p2;
        
        this.updateScoreboard();
        
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('game-view').classList.remove('hidden');
    },

    addScore(points) {
        game.addPoints(points);
        this.updateScoreboard();
    },

    switchTurn() {
        game.switchTurn();
        this.updateScoreboard();
    },

    undo() {
        game.undo();
        this.updateScoreboard();
    },

    updateScoreboard() {
        document.getElementById('score-0').innerText = game.scores[0];
        document.getElementById('score-1').innerText = game.scores[1];
        
        document.getElementById('box-0').className = `player-box ${game.activePlayerIndex === 0 ? 'active' : ''}`;
        document.getElementById('box-1').className = `player-box ${game.activePlayerIndex === 1 ? 'active' : ''}`;
    },

    async endGame() {
        if (confirm("End current frame and save result?")) {
            await db.saveGame(game.getData());
            alert("Game Saved!");
            this.showSetup();
        }
    },

    async showHistory() {
        const games = await db.getAllGames();
        const list = document.getElementById('history-list');
        list.innerHTML = "";
        
        games.reverse().forEach(g => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span>${g.players[0]} vs ${g.players[1]}</span>
                <span><b>${g.finalScores[0]} - ${g.finalScores[1]}</b> <small>${g.date}</small></span>
            `;
            list.appendChild(div);
        });

        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('history-view').classList.remove('hidden');
    }
};

// Initialize app
GameUI.init();
</script>

</body>
</html>
