<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooker Scorekeeper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0f0f1a;
            --panel: #1a1a2e;
            --accent: #4caf50;
            --text: #e0e0e0;
            --text-dim: #888;
            --red: #dc143c;
            --yellow: #ffd700;
            --green: #228b22;
            --brown: #8b4513;
            --blue: #1e90ff;
            --pink: #ff69b4;
            --black: #1a1a1a;
            --felt: #1b5e20;
            --felt-light: #2e7d32;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Screens */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .app-header {
            text-align: center;
            padding: 30px 0 20px;
        }
        .app-header h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        .app-header p {
            color: var(--text-dim);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* Setup Screen */
        .setup-card {
            background: var(--panel);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .input-group {
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(0,0,0,0.2);
            color: var(--text);
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0,0,0,0.3);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            width: 100%;
            margin-top: 12px;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        .btn-danger {
            background: #dc143c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #b91c3c;
        }
        .btn-warning {
            background: #ff9800;
            color: #fff;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
        }

        /* Scoreboard */
        .scoreboard {
            background: var(--panel);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .player-score {
            text-align: center;
            flex: 1;
            padding: 0 20px;
            position: relative;
        }
        .player-score.active::after {
            content: '▶';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 0.8rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .score-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.1);
        }
        .score-name {
            margin-top: 8px;
            font-size: 1rem;
            color: var(--text-dim);
            font-weight: 500;
        }
        .player-score.active .score-name {
            color: var(--accent);
        }
        .vs-divider {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 300;
            padding: 0 10px;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            font-size: 0.9rem;
            color: var(--text-dim);
        }
        .stat-item {
            background: var(--panel);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item span {
            color: var(--text);
            font-weight: 600;
        }
        .snookers-needed {
            color: #ff9800;
            font-weight: 700;
        }

        /* Table Area */
        .table-area {
            background: radial-gradient(ellipse at center, var(--felt-light) 0%, var(--felt) 100%);
            border-radius: 20px;
            padding: 30px;
            border: 4px solid #5d4037;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.3), 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        /* Balls */
        .balls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .balls-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .section-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            font-weight: 600;
        }
        .balls-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .ball {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                inset -4px -4px 10px rgba(0,0,0,0.4),
                inset 4px 4px 10px rgba(255,255,255,0.35),
                2px 4px 8px rgba(0,0,0,0.4);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ball::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 40%;
            height: 40%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.6) 0%, transparent 70%);
            pointer-events: none;
        }
        .ball:hover {
            transform: scale(1.15);
            box-shadow:
                inset -4px -4px 10px rgba(0,0,0,0.4),
                inset 4px 4px 10px rgba(255,255,255,0.4),
                0 0 20px rgba(255,255,255,0.2);
        }
        .ball:active { transform: scale(0.95); }
        .ball.disabled {
            opacity: 0.15;
            cursor: not-allowed;
            pointer-events: none;
            transform: none;
        }
        .ball.legal {
            animation: legalPulse 2s infinite;
            box-shadow:
                inset -4px -4px 10px rgba(0,0,0,0.4),
                inset 4px 4px 10px rgba(255,255,255,0.35),
                0 0 15px rgba(255,255,255,0.4);
        }
        @keyframes legalPulse {
            0%, 100% { box-shadow: inset -4px -4px 10px rgba(0,0,0,0.4), inset 4px 4px 10px rgba(255,255,255,0.35), 0 0 10px rgba(255,255,255,0.2); }
            50% { box-shadow: inset -4px -4px 10px rgba(0,0,0,0.4), inset 4px 4px 10px rgba(255,255,255,0.35), 0 0 25px rgba(255,255,255,0.5); }
        }

        .ball-red { background: radial-gradient(circle at 30% 30%, #ff4444, #8b0000); }
        .ball-yellow { background: radial-gradient(circle at 30% 30%, #ffeb3b, #f9a825); }
        .ball-green { background: radial-gradient(circle at 30% 30%, #4caf50, #1b5e20); }
        .ball-brown { background: radial-gradient(circle at 30% 30%, #a1887f, #3e2723); }
        .ball-blue { background: radial-gradient(circle at 30% 30%, #42a5f5, #0d47a1); }
        .ball-pink { background: radial-gradient(circle at 30% 30%, #f48fb1, #c2185b); }
        .ball-black { background: radial-gradient(circle at 30% 30%, #424242, #000000); }

        .ball-value {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
        }

        /* Current Break */
        .break-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .break-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .break-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .break-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        .break-balls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            min-height: 28px;
        }
        .break-ball {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), inset 2px 2px 4px rgba(255,255,255,0.2);
        }

        /* Controls */
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .controls .btn {
            width: 100%;
        }

        /* History */
        .history-panel {
            background: var(--panel);
            border-radius: 12px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .history-panel h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 12px;
            position: sticky;
            top: 0;
            background: var(--panel);
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .history-entry {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.9rem;
        }
        .history-entry:last-child { border-bottom: none; }
        .history-player {
            font-weight: 600;
            color: var(--accent);
            min-width: 80px;
        }
        .history-action {
            flex: 1;
            color: var(--text-dim);
        }
        .history-action .ball-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
            box-shadow: inset -1px -1px 2px rgba(0,0,0,0.3);
        }
        .history-score {
            font-weight: 700;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        .history-foul {
            color: #ff5252;
        }

        /* Frame History Screen */
        .frame-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .frame-card {
            background: var(--panel);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s;
        }
        .frame-card:hover {
            background: rgba(255,255,255,0.03);
            transform: translateX(5px);
        }
        .frame-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .frame-players {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .frame-date {
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .frame-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .frame-winner {
            color: var(--accent);
            font-weight: 700;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--panel);
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal h3 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        .foul-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .foul-option {
            padding: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0,0,0,0.2);
        }
        .foul-option:hover {
            border-color: var(--accent);
            background: rgba(76, 175, 80, 0.1);
        }
        .foul-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }
        .foul-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .score-value { font-size: 2.5rem; }
            .ball { width: 36px; height: 36px; }
            .setup-card { padding: 24px; }
            .table-area { padding: 20px; }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- SETUP SCREEN -->
        <div id="setupScreen" class="screen active">
            <div class="app-header">
                <h1>🎱 Snooker Scorekeeper</h1>
                <p>Track your frames with style</p>
            </div>
            <div class="setup-card">
                <div class="input-group">
                    <label for="player1">Player 1</label>
                    <input type="text" id="player1" placeholder="Enter name" value="Player 1">
                </div>
                <div class="input-group">
                    <label for="player2">Player 2</label>
                    <input type="text" id="player2" placeholder="Enter name" value="Player 2">
                </div>
                <button class="btn btn-primary" onclick="app.startNewFrame()">Start New Frame</button>
                <button class="btn btn-secondary" onclick="app.loadActiveFrame()" id="resumeBtn" style="display:none">Resume Last Frame</button>
                <button class="btn btn-secondary" onclick="app.showFrameHistory()">View Frame History</button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="gameScreen" class="screen">
            <div class="app-header" style="padding: 15px 0;">
                <h1 style="font-size: 1.5rem;">Snooker Scorekeeper</h1>
            </div>

            <div class="scoreboard" id="scoreboard">
                <div class="player-score" id="player0Score">
                    <div class="score-value" id="score0">0</div>
                    <div class="score-name" id="name0">Player 1</div>
                </div>
                <div class="vs-divider">VS</div>
                <div class="player-score" id="player1Score">
                    <div class="score-value" id="score1">0</div>
                    <div class="score-name" id="name1">Player 2</div>
                </div>
            </div>

            <div class="stats-bar" id="statsBar">
                <div class="stat-item">Remaining: <span id="remainingPoints">147</span></div>
                <div class="stat-item">Break: <span id="highestBreak">0</span></div>
                <div class="stat-item snookers-needed" id="snookersNeeded" style="display:none">Snookers Needed: <span>0</span></div>
            </div>

            <div class="table-area">
                <div class="balls-container">
                    <div class="balls-section" id="redsSection">
                        <div class="section-label">Reds (<span id="redsCount">15</span>)</div>
                        <div class="balls-row" id="redsRow"></div>
                    </div>
                    <div class="balls-section">
                        <div class="section-label">Colors</div>
                        <div class="balls-row" id="colorsRow"></div>
                    </div>
                </div>
            </div>

            <div class="break-panel">
                <div class="break-header">
                    <div class="break-title">Current Break</div>
                    <div class="break-total" id="breakTotal">0</div>
                </div>
                <div class="break-balls" id="breakBalls"></div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary btn-sm" onclick="app.endTurn()">Miss / End Turn</button>
                <button class="btn btn-warning btn-sm" onclick="app.showFoulModal()">Foul</button>
                <button class="btn btn-secondary btn-sm" onclick="app.switchPlayer()">Switch Player</button>
                <button class="btn btn-secondary btn-sm" onclick="app.undo()">Undo</button>
                <button class="btn btn-danger btn-sm" onclick="app.endFrame()">End Frame</button>
                <button class="btn btn-secondary btn-sm" onclick="app.confirmNewFrame()">New Frame</button>
            </div>

            <div class="history-panel">
                <h3>Shot History</h3>
                <div id="historyList"></div>
            </div>
        </div>

        <!-- FRAME HISTORY SCREEN -->
        <div id="historyScreen" class="screen">
            <div class="app-header">
                <h1 style="font-size: 1.5rem;">Frame History</h1>
            </div>
            <div class="frame-list" id="frameList"></div>
            <button class="btn btn-secondary" style="margin-top: 20px;" onclick="app.showSetup()">Back to Menu</button>
        </div>
    </div>

    <!-- FOUL MODAL -->
    <div class="modal-overlay" id="foulModal">
        <div class="modal">
            <h3>Select Foul Value</h3>
            <div class="foul-options">
                <div class="foul-option" onclick="app.recordFoul(4)">
                    <div class="foul-value">4</div>
                    <div class="foul-label">Minimum</div>
                </div>
                <div class="foul-option" onclick="app.recordFoul(5)">
                    <div class="foul-value">5</div>
                    <div class="foul-label">Blue</div>
                </div>
                <div class="foul-option" onclick="app.recordFoul(6)">
                    <div class="foul-value">6</div>
                    <div class="foul-label">Pink</div>
                </div>
                <div class="foul-option" onclick="app.recordFoul(7)">
                    <div class="foul-value">7</div>
                    <div class="foul-label">Black</div>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="app.hideFoulModal()" style="width:100%">Cancel</button>
        </div>
    </div>

    <script>
        // ==================== DATABASE LAYER ====================
        // Clean IndexedDB API — can be swapped for a server API later
        
        class SnookerDB {
            constructor(dbName = 'SnookerDB', version = 1) {
                this.dbName = dbName;
                this.version = version;
                this.db = null;
            }

            async init() {
                if (this.db) return this.db;
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve(this.db);
                    };
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('frames')) {
                            const store = db.createObjectStore('frames', { keyPath: 'id', autoIncrement: true });
                            store.createIndex('status', 'status', { unique: false });
                            store.createIndex('date', 'date', { unique: false });
                        }
                    };
                });
            }

            async _transaction(storeName, mode, operation) {
                await this.init();
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, mode);
                    const store = tx.objectStore(storeName);
                    const request = operation(store);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async createFrame(frame) {
                return this._transaction('frames', 'readwrite', store => store.add(frame));
            }

            async updateFrame(frame) {
                return this._transaction('frames', 'readwrite', store => store.put(frame));
            }

            async getFrame(id) {
                return this._transaction('frames', 'readonly', store => store.get(id));
            }

            async getAllFrames() {
                return this._transaction('frames', 'readonly', store => store.getAll());
            }

            async deleteFrame(id) {
                return this._transaction('frames', 'readwrite', store => store.delete(id));
            }
        }

        // ==================== GAME LOGIC ====================

        const BALL_DATA = {
            red: { value: 1, label: 'Red' },
            yellow: { value: 2, label: 'Yellow' },
            green: { value: 3, label: 'Green' },
            brown: { value: 4, label: 'Brown' },
            blue: { value: 5, label: 'Blue' },
            pink: { value: 6, label: 'Pink' },
            black: { value: 7, label: 'Black' }
        };

        const COLOR_ORDER = ['yellow', 'green', 'brown', 'blue', 'pink', 'black'];

        class SnookerGame {
            constructor(savedState = null) {
                if (savedState) {
                    this._restore(savedState);
                } else {
                    this._reset();
                }
            }

            _reset() {
                this.id = null;
                this.players = ['', ''];
                this.scores = [0, 0];
                this.redsRemaining = 15;
                this.colorsOnTable = { yellow: true, green: true, brown: true, blue: true, pink: true, black: true };
                this.phase = 'reds'; // 'reds' | 'colors'
                this.currentPlayer = 0;
                this.lastPottedWasRed = false;
                this.currentBreak = { player: 0, points: 0, balls: [] };
                this.highestBreaks = [0, 0];
                this.status = 'setup'; // 'setup' | 'active' | 'completed'
                this.shots = [];
                this.date = new Date().toISOString();
                this.winner = null;
            }

            _snapshot() {
                return {
                    id: this.id,
                    players: [...this.players],
                    scores: [...this.scores],
                    redsRemaining: this.redsRemaining,
                    colorsOnTable: { ...this.colorsOnTable },
                    phase: this.phase,
                    currentPlayer: this.currentPlayer,
                    lastPottedWasRed: this.lastPottedWasRed,
                    currentBreak: {
                        player: this.currentBreak.player,
                        points: this.currentBreak.points,
                        balls: [...this.currentBreak.balls]
                    },
                    highestBreaks: [...this.highestBreaks],
                    status: this.status,
                    shots: JSON.parse(JSON.stringify(this.shots)),
                    date: this.date,
                    winner: this.winner
                };
            }

            _restore(state) {
                this.id = state.id;
                this.players = [...state.players];
                this.scores = [...state.scores];
                this.redsRemaining = state.redsRemaining;
                this.colorsOnTable = { ...state.colorsOnTable };
                this.phase = state.phase;
                this.currentPlayer = state.currentPlayer;
                this.lastPottedWasRed = state.lastPottedWasRed;
                this.currentBreak = {
                    player: state.currentBreak.player,
                    points: state.currentBreak.points,
                    balls: [...state.currentBreak.balls]
                };
                this.highestBreaks = [...state.highestBreaks];
                this.status = state.status;
                this.shots = JSON.parse(JSON.stringify(state.shots));
                this.date = state.date;
                this.winner = state.winner;
            }

            serialize() {
                return this._snapshot();
            }

            init(player1, player2) {
                this.players = [player1, player2];
                this.status = 'active';
                this.currentBreak.player = 0;
            }

            getRemainingPoints() {
                if (this.phase === 'reds') {
                    return this.redsRemaining * 8 + 27;
                } else {
                    let sum = 0;
                    for (const color of COLOR_ORDER) {
                        if (this.colorsOnTable[color]) sum += BALL_DATA[color].value;
                    }
                    return sum;
                }
            }

            getSnookersNeeded() {
                if (this.status !== 'active') return 0;
                const maxScore = Math.max(this.scores[0], this.scores[1]);
                const minScore = Math.min(this.scores[0], this.scores[1]);
                const remaining = this.getRemainingPoints();
                const diff = maxScore - minScore;
                return diff > remaining ? diff - remaining : 0;
            }

            getNextLegalBalls() {
                if (this.status !== 'active') return [];
                const balls = [];
                if (this.phase === 'reds') {
                    if (this.lastPottedWasRed) {
                        for (const color of COLOR_ORDER) {
                            balls.push({ type: color, value: BALL_DATA[color].value });
                        }
                    } else {
                        if (this.redsRemaining > 0) {
                            balls.push({ type: 'red', value: 1 });
                        }
                    }
                } else {
                    for (const color of COLOR_ORDER) {
                        if (this.colorsOnTable[color]) {
                            balls.push({ type: color, value: BALL_DATA[color].value });
                            break;
                        }
                    }
                }
                return balls;
            }

            potBall(ballType) {
                if (this.status !== 'active') return null;
                const legalBalls = this.getNextLegalBalls();
                const ball = legalBalls.find(b => b.type === ballType);
                if (!ball) throw new Error(`Illegal shot: ${ballType}`);

                const stateBefore = this._snapshot();

                // Update state
                if (ballType === 'red') {
                    this.redsRemaining--;
                    this.lastPottedWasRed = true;
                } else {
                    this.lastPottedWasRed = false;
                    if (this.phase === 'colors') {
                        this.colorsOnTable[ballType] = false;
                    }
                }

                this.scores[this.currentPlayer] += ball.value;
                this.currentBreak.points += ball.value;
                this.currentBreak.balls.push(ballType);

                // Phase transition
                if (this.phase === 'reds' && this.redsRemaining === 0 && !this.lastPottedWasRed) {
                    this.phase = 'colors';
                }

                // Frame end check
                if (this.phase === 'colors' && ballType === 'black' && !this.colorsOnTable['black']) {
                    this._finalizeFrame();
                }

                const shot = {
                    player: this.currentPlayer,
                    ball: ballType,
                    value: ball.value,
                    timestamp: Date.now(),
                    scores: [...this.scores],
                    breakPoints: this.currentBreak.points,
                    stateBefore: stateBefore
                };
                this.shots.push(shot);
                return shot;
            }

            recordFoul(points) {
                if (this.status !== 'active') return null;
                const stateBefore = this._snapshot();

                // Finalize current break
                if (this.currentBreak.points > 0) {
                    if (this.currentBreak.points > this.highestBreaks[this.currentPlayer]) {
                        this.highestBreaks[this.currentPlayer] = this.currentBreak.points;
                    }
                }

                const opponent = 1 - this.currentPlayer;
                this.scores[opponent] += points;

                const shot = {
                    player: this.currentPlayer,
                    ball: 'foul',
                    value: -points,
                    timestamp: Date.now(),
                    scores: [...this.scores],
                    breakPoints: this.currentBreak.points,
                    foulPoints: points,
                    stateBefore: stateBefore
                };
                this.shots.push(shot);

                this.currentPlayer = opponent;
                this.currentBreak = { player: this.currentPlayer, points: 0, balls: [] };

                return shot;
            }

            endTurn() {
                if (this.status !== 'active') return null;
                const stateBefore = this._snapshot();

                if (this.currentBreak.points > 0) {
                    if (this.currentBreak.points > this.highestBreaks[this.currentPlayer]) {
                        this.highestBreaks[this.currentPlayer] = this.currentBreak.points;
                    }
                }

                const shot = {
                    player: this.currentPlayer,
                    ball: 'miss',
                    value: 0,
                    timestamp: Date.now(),
                    scores: [...this.scores],
                    breakPoints: this.currentBreak.points,
                    stateBefore: stateBefore
                };
                this.shots.push(shot);

                this.currentPlayer = 1 - this.currentPlayer;
                this.currentBreak = { player: this.currentPlayer, points: 0, balls: [] };

                return shot;
            }

            switchPlayer() {
                if (this.status !== 'active') return null;
                const stateBefore = this._snapshot();

                if (this.currentBreak.points > 0) {
                    if (this.currentBreak.points > this.highestBreaks[this.currentPlayer]) {
                        this.highestBreaks[this.currentPlayer] = this.currentBreak.points;
                    }
                }

                const shot = {
                    player: this.currentPlayer,
                    ball: 'switch',
                    value: 0,
                    timestamp: Date.now(),
                    scores: [...this.scores],
                    breakPoints: this.currentBreak.points,
                    stateBefore: stateBefore
                };
                this.shots.push(shot);

                this.currentPlayer = 1 - this.currentPlayer;
                this.currentBreak = { player: this.currentPlayer, points: 0, balls: [] };

                return shot;
            }

            undo() {
                if (this.shots.length === 0) return false;
                const lastShot = this.shots.pop();
                this._restore(lastShot.stateBefore);
                return true;
            }

            endFrame() {
                if (this.status !== 'active') return;
                this._finalizeFrame();
            }

            _finalizeFrame() {
                if (this.currentBreak.points > 0) {
                    if (this.currentBreak.points > this.highestBreaks[this.currentPlayer]) {
                        this.highestBreaks[this.currentPlayer] = this.currentBreak.points;
                    }
                }
                this.status = 'completed';
                if (this.scores[0] > this.scores[1]) this.winner = 0;
                else if (this.scores[1] > this.scores[0]) this.winner = 1;
                else this.winner = -1; // Draw
            }
        }

        // ==================== UI CONTROLLER ====================

        class App {
            constructor() {
                this.db = new SnookerDB();
                this.game = null;
                this.currentFrameId = null;
            }

            async init() {
                await this.db.init();
                this.checkResume();
                this.attachKeyboard();
            }

            async checkResume() {
                const frames = await this.db.getAllFrames();
                const active = frames.find(f => f.status === 'active');
                if (active) {
                    document.getElementById('resumeBtn').style.display = 'inline-flex';
                }
            }

            async startNewFrame() {
                const p1 = document.getElementById('player1').value.trim() || 'Player 1';
                const p2 = document.getElementById('player2').value.trim() || 'Player 2';

                this.game = new SnookerGame();
                this.game.init(p1, p2);

                const frame = {
                    player1: p1,
                    player2: p2,
                    status: 'active',
                    winner: null,
                    date: new Date().toISOString(),
                    state: this.game.serialize()
                };

                this.currentFrameId = await this.db.createFrame(frame);
                this.game.id = this.currentFrameId;

                this.showScreen('gameScreen');
                this.render();
            }

            async loadActiveFrame() {
                const frames = await this.db.getAllFrames();
                const active = frames.find(f => f.status === 'active');
                if (!active) return;

                this.currentFrameId = active.id;
                this.game = new SnookerGame(active.state);
                this.showScreen('gameScreen');
                this.render();
            }

            async saveFrame() {
                if (!this.game || !this.currentFrameId) return;
                const frame = await this.db.getFrame(this.currentFrameId);
                frame.state = this.game.serialize();
                frame.status = this.game.status;
                frame.winner = this.game.winner;
                frame.scores = this.game.scores;
                await this.db.updateFrame(frame);
            }

            async showFrameHistory() {
                const frames = await this.db.getAllFrames();
                const list = document.getElementById('frameList');
                list.innerHTML = '';

                if (frames.length === 0) {
                    list.innerHTML = '<div class="empty-state">No frames recorded yet</div>';
                } else {
                    // Sort by date descending
                    frames.sort((a, b) => new Date(b.date) - new Date(a.date));
                    for (const frame of frames) {
                        const card = document.createElement('div');
                        card.className = 'frame-card';
                        const winnerText = frame.winner === 0 ? frame.player1 : frame.winner === 1 ? frame.player2 : 'Draw';
                        const scores = frame.state?.scores || [0, 0];
                        card.innerHTML = `
                            <div class="frame-card-header">
                                <div class="frame-players">${frame.player1} vs ${frame.player2}</div>
                                <div class="frame-date">${new Date(frame.date).toLocaleDateString()}</div>
                            </div>
                            <div class="frame-result">
                                <div>Score: ${scores[0]} - ${scores[1]}</div>
                                <div class="frame-winner">${frame.status === 'active' ? 'In Progress' : 'Winner: ' + winnerText}</div>
                            </div>
                        `;
                        card.onclick = () => this.loadFrame(frame.id);
                        list.appendChild(card);
                    }
                }
                this.showScreen('historyScreen');
            }

            async loadFrame(id) {
                const frame = await this.db.getFrame(id);
                if (!frame) return;
                this.currentFrameId = frame.id;
                this.game = new SnookerGame(frame.state);
                this.showScreen('gameScreen');
                this.render();
            }

            showSetup() {
                this.showScreen('setupScreen');
                this.checkResume();
            }

            showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
            }

            // Game actions
            potBall(ballType) {
                if (!this.game) return;
                try {
                    this.game.potBall(ballType);
                    this.saveFrame();
                    this.render();
                } catch (e) {
                    console.error(e);
                }
            }

            endTurn() {
                if (!this.game) return;
                this.game.endTurn();
                this.saveFrame();
                this.render();
            }

            showFoulModal() {
                document.getElementById('foulModal').classList.add('active');
            }

            hideFoulModal() {
                document.getElementById('foulModal').classList.remove('active');
            }

            recordFoul(points) {
                if (!this.game) return;
                this.game.recordFoul(points);
                this.saveFrame();
                this.hideFoulModal();
                this.render();
            }

            switchPlayer() {
                if (!this.game) return;
                this.game.switchPlayer();
                this.saveFrame();
                this.render();
            }

            undo() {
                if (!this.game) return;
                if (this.game.undo()) {
                    this.saveFrame();
                    this.render();
                }
            }

            endFrame() {
                if (!this.game) return;
                if (confirm('End this frame?')) {
                    this.game.endFrame();
                    this.saveFrame();
                    this.render();
                }
            }

            confirmNewFrame() {
                if (confirm('Start a new frame? Current progress will be saved.')) {
                    this.showSetup();
                }
            }

            // Rendering
            render() {
                if (!this.game) return;
                const state = this.game;

                // Scoreboard
                document.getElementById('score0').textContent = state.scores[0];
                document.getElementById('score1').textContent = state.scores[1];
                document.getElementById('name0').textContent = state.players[0];
                document.getElementById('name1').textContent = state.players[1];

                document.getElementById('player0Score').classList.toggle('active', state.currentPlayer === 0 && state.status === 'active');
                document.getElementById('player1Score').classList.toggle('active', state.currentPlayer === 1 && state.status === 'active');

                // Stats
                document.getElementById('remainingPoints').textContent = state.getRemainingPoints();
                const maxBreak = Math.max(state.highestBreaks[0], state.highestBreaks[1]);
                document.getElementById('highestBreak').textContent = maxBreak;

                const snookers = state.getSnookersNeeded();
                const snookerEl = document.getElementById('snookersNeeded');
                if (snookers > 0) {
                    snookerEl.style.display = 'block';
                    snookerEl.querySelector('span').textContent = snookers;
                } else {
                    snookerEl.style.display = 'none';
                }

                // Reds
                document.getElementById('redsCount').textContent = state.redsRemaining;
                const redsRow = document.getElementById('redsRow');
                redsRow.innerHTML = '';
                const legalBalls = state.getNextLegalBalls();
                const redLegal = legalBalls.some(b => b.type === 'red');

                for (let i = 0; i < 15; i++) {
                    const ball = document.createElement('div');
                    ball.className = 'ball ball-red';
                    if (i >= state.redsRemaining) {
                        ball.classList.add('disabled');
                    } else if (redLegal) {
                        ball.classList.add('legal');
                        ball.onclick = () => this.potBall('red');
                    } else {
                        ball.classList.add('disabled');
                    }
                    redsRow.appendChild(ball);
                }

                // Colors
                const colorsRow = document.getElementById('colorsRow');
                colorsRow.innerHTML = '';
                for (const color of COLOR_ORDER) {
                    const isOnTable = state.phase === 'reds' ? true : state.colorsOnTable[color];
                    const isLegal = legalBalls.some(b => b.type === color);

                    const wrapper = document.createElement('div');
                    wrapper.style.position = 'relative';
                    wrapper.style.display = 'inline-block';

                    const ball = document.createElement('div');
                    ball.className = `ball ball-${color}`;
                    if (!isOnTable) {
                        ball.classList.add('disabled');
                    } else if (isLegal) {
                        ball.classList.add('legal');
                        ball.onclick = () => this.potBall(color);
                    } else {
                        ball.classList.add('disabled');
                    }

                    const label = document.createElement('div');
                    label.className = 'ball-value';
                    label.textContent = BALL_DATA[color].value;

                    wrapper.appendChild(ball);
                    wrapper.appendChild(label);
                    colorsRow.appendChild(wrapper);
                }

                // Current Break
                document.getElementById('breakTotal').textContent = state.currentBreak.points;
                const breakBalls = document.getElementById('breakBalls');
                breakBalls.innerHTML = '';
                for (const ballType of state.currentBreak.balls) {
                    const b = document.createElement('div');
                    b.className = `break-ball ball-${ballType}`;
                    breakBalls.appendChild(b);
                }

                // History
                this.renderHistory();

                // If frame completed, show alert
                if (state.status === 'completed') {
                    const winner = state.winner === -1 ? "It's a draw!" : `${state.players[state.winner]} wins!`;
                    setTimeout(() => {
                        alert(`Frame Complete!\n\nFinal Score: ${state.scores[0]} - ${state.scores[1]}\n${winner}`);
                    }, 100);
                }
            }

            renderHistory() {
                const list = document.getElementById('historyList');
                list.innerHTML = '';

                if (this.game.shots.length === 0) {
                    list.innerHTML = '<div class="empty-state" style="padding: 20px;">No shots yet</div>';
                    return;
                }

                // Group shots into breaks for display
                const entries = [];
                let currentBreakPlayer = null;
                let currentBreakShots = [];

                for (const shot of this.game.shots) {
                    if (shot.ball === 'miss' || shot.ball === 'foul' || shot.ball === 'switch') {
                        // Flush previous break
                        if (currentBreakShots.length > 0) {
                            entries.push({ type: 'break', shots: currentBreakShots, player: currentBreakPlayer });
                            currentBreakShots = [];
                        }
                        entries.push({ type: 'event', shot });
                        currentBreakPlayer = null;
                    } else {
                        if (currentBreakPlayer !== shot.player) {
                            if (currentBreakShots.length > 0) {
                                entries.push({ type: 'break', shots: currentBreakShots, player: currentBreakPlayer });
                            }
                            currentBreakShots = [];
                            currentBreakPlayer = shot.player;
                        }
                        currentBreakShots.push(shot);
                    }
                }
                if (currentBreakShots.length > 0) {
                    entries.push({ type: 'break', shots: currentBreakShots, player: currentBreakPlayer });
                }

                // Render entries
                for (const entry of entries) {
                    if (entry.type === 'break') {
                        const div = document.createElement('div');
                        div.className = 'history-entry';
                        const ballsHtml = entry.shots.map(s => {
                            const colorClass = `ball-${s.ball}`;
                            return `<span class="ball-icon ${colorClass}"></span>${BALL_DATA[s.ball].label}(${s.value})`;
                        }).join(' ');
                        div.innerHTML = `
                            <div class="history-player">${this.game.players[entry.player]}</div>
                            <div class="history-action">${ballsHtml}</div>
                            <div class="history-score">${entry.shots[entry.shots.length - 1].scores[0]} - ${entry.shots[entry.shots.length - 1].scores[1]}</div>
                        `;
                        list.appendChild(div);
                    } else {
                        const div = document.createElement('div');
                        div.className = 'history-entry';
                        const s = entry.shot;
                        if (s.ball === 'foul') {
                            const opponent = 1 - s.player;
                            div.innerHTML = `
                                <div class="history-player">${this.game.players[s.player]}</div>
                                <div class="history-action history-foul">Foul ${s.foulPoints} → ${this.game.players[opponent]}</div>
                                <div class="history-score">${s.scores[0]} - ${s.scores[1]}</div>
                            `;
                        } else if (s.ball === 'miss') {
                            div.innerHTML = `
                                <div class="history-player">${this.game.players[s.player]}</div>
                                <div class="history-action">Miss (break ${s.breakPoints})</div>
                                <div class="history-score">${s.scores[0]} - ${s.scores[1]}</div>
                            `;
                        } else if (s.ball === 'switch') {
                            div.innerHTML = `
                                <div class="history-player">${this.game.players[s.player]}</div>
                                <div class="history-action">Switch Player</div>
                                <div class="history-score">${s.scores[0]} - ${s.scores[1]}</div>
                            `;
                        }
                        list.appendChild(div);
                    }
                }
            }

            attachKeyboard() {
                document.addEventListener('keydown', (e) => {
                    if (!this.game || this.game.status !== 'active') return;
                    if (document.getElementById('foulModal').classList.contains('active')) return;

                    const key = e.key.toLowerCase();
                    const legal = this.game.getNextLegalBalls().map(b => b.type);

                    if (key === '1' && legal.includes('red')) this.potBall('red');
                    else if (key === '2' && legal.includes('yellow')) this.potBall('yellow');
                    else if (key === '3' && legal.includes('green')) this.potBall('green');
                    else if (key === '4' && legal.includes('brown')) this.potBall('brown');
                    else if (key === '5' && legal.includes('blue')) this.potBall('blue');
                    else if (key === '6' && legal.includes('pink')) this.potBall('pink');
                    else if (key === '7' && legal.includes('black')) this.potBall('black');
                    else if (key === 'm') this.endTurn();
                    else if (key === 'f') this.showFoulModal();
                    else if (key === 'u') this.undo();
                    else if (key === 's') this.switchPlayer();
                });
            }
        }

        const app = new App();
        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
