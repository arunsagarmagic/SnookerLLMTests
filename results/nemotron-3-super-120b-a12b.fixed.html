<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snooker Scorer</title>
<style>
  :root {
    --bg: #0b3d0b;
    --panel: #114b11;
    --text: #e0e0e0;
    --accent: #ffdd00;
    --red: #ff0000;
    --yellow: #ffff00;
    --green: #009900;
    --brown: #8b4513;
    --blue: #0000ff;
    --pink: #ff69b4;
    --black: #000000;
    --shadow: rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }
  h1 { margin-top: 1rem; font-size: 2rem; letter-spacing:1px; }
  .form-section, .game-section { width: 100%; max-width: 480px; }
  input, button {
    padding: .5rem .8rem;
    font-size: 1rem;
    margin: .3rem 0;
    border: none;
    border-radius: 4px;
  }
  input[type="text"] { width: 100%; }
  button { background: var(--accent); color: #000; cursor:pointer; }
  button:hover { background: #ffe066; }
  .game-section { display:none; }
  .scoreboard {
    display:flex; justify-content:space-between; align-items:center;
    background:var(--panel); padding:1rem; border-radius:6px;
    margin-top:1rem;
  }
  .player {
    text-align:center;
    flex:1;
  }
  .player.name { font-weight:bold; font-size:1.2rem; }
  .player.score { font-size:2.2rem; margin-top:.3rem; }
  .turn-indicator {
    width:2.4rem; height:2.4rem; border-radius:50%;
    background:var(--accent); display:flex; align-items:center; justify-content:center;
    font-weight:bold;
  }
  .balls-panel {
    margin-top:1.5rem; display:flex; flex-wrap:wrap; gap:.8rem; justify-content:center;
  }
  .ball {
    width:2.8rem; height:2.8rem; border-radius:50%;
    position:relative; cursor:pointer;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.3),
                inset 0 -4px 8px rgba(0,0,0,.4),
                inset 0 4px 8px rgba(255,255,255,.2);
    transition:transform .1s;
  }
  .ball:active { transform:scale(.95); }
  .ball::after {
    content:""; position:absolute; inset:0;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.6), transparent 70%);
    pointer-events:none;
  }
  .ball.disabled { opacity:.4; cursor:default; }
  .history {
    margin-top:2rem; width:100%; max-width:480px;
    background:var(--panel); border-radius:6px; padding:1rem;
    max-height:200px; overflow-y:auto;
  }
  .history h3 { margin-bottom:.5rem; font-size:1.1rem; text-align:center; }
  .history ul { list-style:none; padding:0; }
  .history li {
    display:flex; justify-content:space-between; font-size:.9rem;
    padding:.2rem 0; border-bottom:1px solid rgba(255,255,255,.1);
  }
  .history li:last-child { border-bottom:none; }
  .undo-btn { margin-top:1rem; }
</style>
</head>
<body>

<h1>Snooker Scorer</h1>

<!-- ==== Player entry ==== -->
<section class="form-section" id="formSection">
  <label for="p1">Player 1 name:</label>
  <input type="text" id="p1" placeholder="Enter name">
  <label for="p2">Player 2 name:</label>
  <input type="text" id="p2" placeholder="Enter name">
  <button id="startBtn">Start Game</button>
</section>

<!-- ==== Game view ==== -->
<section class="game-section" id="gameSection">
  <div class="scoreboard" id="scoreboard">
    <div class="player">
      <div class="name" id="p1Name"></div>
      <div class="score" id="p1Score">0</div>
    </div>
    <div class="turn-indicator" id="turnIndicator"></div>
    <div class="player">
      <div class="name" id="p2Name"></div>
      <div class="score" id="p2Score">0</div>
    </div>
  </div>

  <div class="balls-panel" id="ballsPanel"></div>

  <button class="undo-btn" id="undoBtn" disabled>Undo</button>

  <div class="history" id="historyBox">
    <h3>Move History</h3>
    <ul id="historyList"></ul>
  </div>
</section>

<script>
/* --------------------------------------------------------------
   Thin DB abstraction – swap this class for any other backend
   -------------------------------------------------------------- */
class SnookerDB {
  constructor() {
    this.dbName = 'snookerScorerDB';
    this.storeName = 'games';
    this.version = 1;
    this.db = null;
  }

  /** Open (or create) the IndexedDB database */
  async open() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(this.dbName, this.version);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(this.storeName)) {
          db.createObjectStore(this.storeName, { keyPath: 'id', autoIncrement:true });
        }
      };
      request.onsuccess = () => {
        this.db = request.result;
        resolve();
      };
      request.onerror = () => reject(request.error);
    });
  }

  /** Add a new game record */
  async addGame(game) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([this.storeName], 'readwrite');
      const store = tx.objectStore(this.storeName);
      const req = store.add(game);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  /** Update an existing game (by id) */
  async updateGame(id, changes) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([this.storeName], 'readwrite');
      const store = tx.objectStore(this.storeName);
      const getReq = store.get(id);
      getReq.onsuccess = () => {
        const obj = getReq.result;
        if (!obj) return reject(new Error('Game not found'));
        Object.assign(obj, changes);
        const putReq = store.put(obj);
        putReq.onsuccess = () => resolve();
        putReq.onerror = () => reject(putReq.error);
      };
      getReq.onerror = () => reject(getReq.error);
    });
  }

  /** Get all games (most recent first) */
  async getAllGames() {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([this.storeName], 'readonly');
      const store = tx.objectStore(this.storeName);
      const req = store.getAll();
      req.onsuccess = () => {
        const games = req.result.sort((a,b)=> b.id - a.id);
        resolve(games);
      };
      req.onerror = () => reject(req.error);
    });
  }

  /** Delete a game (optional) */
  async deleteGame(id) {
    return new Promise((resolve, reject) => {
      const tx = this.db.transaction([this.storeName], 'readwrite');
      const store = tx.objectStore(this.storeName);
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
}

/* --------------------------------------------------------------
   Game logic & UI
   -------------------------------------------------------------- */
const db = new SnookerDB;

let state = {
  id: null,                // DB id once saved
  p1: '',
  p2: '',
  scores: [0,0],           // 0 → p1, 1 → p2
  turn: 0,                 // 0 = p1, 1 = p2
  remaining: { red:15, yellow:1, green:1, brown:1, blue:1, pink:1, black:1 },
  history: []              // array of {turn, player, ball, points, scoresAfter, timestamp, remainingSnapshot}
};

const ballValues = {
  red:1, yellow:2, green:3, brown:4, blue:5, pink:6, black:7
};
const ballColors = {
  red: 'var(--red)', yellow: 'var(--yellow)', green: 'var(--green)',
  brown: 'var(--brown)', blue: 'var(--blue)', pink: 'var(--pink)', black: 'var(--black)'
};

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

async function init() {
  await db.open();
  $('#formSection').style.display = 'block';
  $('#gameSection').style.display = 'none';
  $('#startBtn').onclick = startGame;
  $('#undoBtn').onclick = undoLastMove;
}

function startGame() {
  const p1 = $('#p1').value.trim() || 'Player 1';
  const p2 = $('#p2').value.trim() || 'Player 2';
  if (!p1 || !p2) return alert('Please enter both names');

  state.p1 = p1; state.p2 = p2;
  state.scores = [0,0];
  state.turn = 0;
  state.remaining = { red:15, yellow:1, green:1, brown:1, blue:1, pink:1, black:1 };
  state.history = [];
  updateUI();
  persistGame(); // create DB entry
  $('#formSection').style.display = 'none';
  $('#gameSection').style.display = 'block';
}

/* ---------- Persistence helpers ---------- */
async function persistGame() {
  const payload = {
    p1: state.p1,
    p2: state.p2,
    scores: state.scores,
    turn: state.turn,
    remaining: state.remaining,
    history: state.history,
    createdAt: new Date().toISOString()
  };
  if (state.id === null) {
    state.id = await db.addGame(payload);
  } else {
    await db.updateGame(state.id, payload);
  }
}

/* ---------- UI rendering ---------- */
function updateUI() {
  // player names & scores
  $('#p1Name').textContent = state.p1;
  $('#p2Name').textContent = state.p2;
  $('#p1Score').textContent = state.scores[0];
  $('#p2Score').textContent = state.scores[1];

  // turn indicator
  const turnEl = $('#turnIndicator');
  turnEl.style.background = state.turn===0 ? 'var(--yellow)' : 'var(--pink)';
  turnEl.textContent = state.turn===0 ? '1' : '2';

  // balls panel
  const panel = $('#ballsPanel');
  panel.innerHTML = '';
  Object.entries(state.remaining).forEach(([color,count])=>{
    if (count<=0) return;
    for(let i=0;i<count;i++){
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.style.backgroundColor = ballColors[color];
      ball.dataset.color = color;
      ball.title = `${color.charAt(0).toUpperCase()+color.slice(1)} (${ballValues[color]} pts)`;
      ball.onclick = ()=> potBall(color);
      panel.appendChild(ball);
    }
  });
  // disable balls that are gone
  $$('.ball').forEach(b=>{
    if (state.remaining[b.dataset.color]===0) b.classList.add('disabled');
  });

  // undo button state
  $('#undoBtn').disabled = state.history.length===0;

  // history list
  const hist = $('#historyList');
  hist.innerHTML = '';
  state.history.slice().reverse().forEach((move,i)=>{
    const li = document.createElement('li');
    li.innerHTML = `
      <span>${move.timestamp}</span>
      <span>${move.player} potted ${move.ball.toUpperCase()} (+${move.points}) → ${state.scores[0]}-${state.scores[1]}</span>
    `;
    hist.prepend(li);
  });
}

/* ---------- Game actions ---------- */
function potBall(color) {
  if (state.remaining[color]===0) return; // safety
  const points = ballValues[color];
  // add to current player
  state.scores[state.turn] += points;

  // update remaining balls
  state.remaining[color]--;

  // record move
  const move = {
    turn: state.turn,
    player: state.turn===0 ? state.p1 : state.p2,
    ball: color,
    points: points,
    scoresAfter: [...state.scores],
    timestamp: new Date().toLocaleTimeString(),
    remainingSnapshot: {...state.remaining} // snapshot for undo
  };
  state.history.push(move);

  // switch turn (simple alternating turn; real snooker rules can be added later)
  state.turn = 1 - state.turn;

  updateUI();
  persistGame();
}

function undoLastMove() {
  if (state.history.length===0) return;
  const last = state.history.pop();
  // revert scores
  state.scores[last.turn] -= last.points;
  // revert remaining balls
  state.remaining = {...last.remainingSnapshot};
  // revert turn (the player who just moved gets the turn back)
  state.turn = last.turn;
  updateUI();
  persistGame();
}

/* --------------------------------------------------------------
   Kick‑off
   -------------------------------------------------------------- */
init();
</script>
</body>
</html>
