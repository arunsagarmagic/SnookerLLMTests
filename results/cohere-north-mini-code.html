<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooker Scoring Pro</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #e74c3c;
            --bg: #f4f7f6;
            --ball-red: #e74c3c;
            --ball-yellow: #f1c40f;
            --ball-green: #2ecc71;
            --ball-brown: #795d3c;
            --ball-blue: #3498db;
            --ball-pink: #e91e63;
            --ball-black: #1a1a1a;
            --surface: #ffffff;
            --shadow-light: rgba(0,0,0,0.1);
            --shadow-med: rgba(0,0,0,0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Layout --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .history-panel {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* --- Start Screen --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.3s;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--secondary);
        }

        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 200px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #c0392b; }

        /* --- Game UI --- */
        .status-bar {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px var(--shadow-med);
        }

        .score-display {
            display: flex;
            gap: 30px;
            font-size: 1.2em;
        }

        .player-label {
            font-weight: 700;
            color: #aaa;
        }

        .player-score {
            font-size: 1.4em;
            color: white;
        }

        .turn-indicator {
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        /* --- Visual Table Area --- */
        .table-container {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-radius: 10px;
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Cue Ball (White) */
        .ball.cue {
            background-color: #ffffff;
            border: 1px solid #ccc;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), 0 0 10px rgba(255,255,255,0.5);
        }

        /* 3D Sphere Style Helper */
        .ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            position: absolute;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            /* 3D Effect */
            transform-style: preserve-3d;
            transform: translateX(-50%) translateY(-50%) rotateX(50deg) rotateY(30deg);
            box-shadow: 
                -2px -2px 5px rgba(255,255,255,0.4) inset,
                3px 3px 5px var(--shadow-med) inset,
                2px 2px 5px var(--shadow-med);
        }

        .ball:hover {
            transform: translateX(-50%) translateY(-50%) rotateX(50deg) rotateY(30deg) scale(1.1);
            box-shadow: 
                -2px -2px 8px rgba(255,255,255,0.5) inset,
                3px 3px 8px var(--shadow-med) inset,
                0px 10px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* --- Input Controls --- */
        .controls {
            margin-top: 20px;
            background: var(--surface);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px var(--shadow-light);
        }

        .controls h3 { margin-bottom: 10px; }

        .ball-selector {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .btn-ball {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid #333;
            background-size: 60%;
            background-position: center;
            background-repeat: no-repeat;
            cursor: pointer;
            transition: transform 0.2s, border 0.2s;
            position: relative;
            padding: 0;
        }

        .btn-ball:hover {
            transform: scale(1.15);
            border-color: #000;
            z-index: 5;
        }

        .btn-ball.potted {
            transform: scale(0.8);
            opacity: 0.5;
            border-style: dashed;
            border-color: var(--accent);
        }

        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .log-entry:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>Snooker Scoring Pro</h1>
        <div style="margin-top: 20px; text-align: center;">
            <div class="input-group">
                <label for="p1">Player 1 Name</label>
                <input type="text" id="p1" placeholder="Player 1" value="Player 1">
            </div>
            <div class="input-group">
                <label for="p2">Player 2 Name</label>
                <input type="text" id="p2" placeholder="Player 2" value="Player 2">
            </div>
            <button onclick="app.initGame()">Start Game</button>
        </div>
    </div>

    <div class="app-container">
        <div class="main-area">
            <!-- Status Bar -->
            <div class="status-bar">
                <div class="score-display">
                    <div>
                        <div class="player-label" id="p1-display">Player 1</div>
                        <div class="player-score" id="score-p1">0</div>
                    </div>
                    <div>
                        <div class="player-label" id="p2-display">Player 2</div>
                        <div class="player-score" id="score-p2">0</div>
                    </div>
                </div>
                <div class="turn-indicator" id="turn-indicator">
                    Turn: <span id="current-turn-name">Player 1</span>
                </div>
            </div>

            <!-- Main Table Area -->
            <div class="table-container" id="table-container">
                <!-- Balls will be injected here -->
                <p style="color: #555;">Enter a ball below to score</p>
            </div>

            <!-- Controls -->
            <div class="controls">
                <h3>Enter Shot</h3>
                <p style="font-size: 0.9em; color: #555; margin-bottom: 10px;">
                    Click the ball that was potted. 
                    <strong id="current-ball-on-stick">Ball on Stick: NONE</strong>
                </p>
                <div class="ball-selector" id="ball-selector">
                    <!-- 3D Ball Buttons will be generated here -->
                </div>
            </div>
        </div>

        <!-- History Panel -->
        <div class="history-panel">
            <h3>Game History</h3>
            <div id="history-log">
                <!-- Logs appear here -->
            </div>
        </div>
    </div>

    <script>
        /**
         * Clean Database API
         * This abstraction layer ensures that the UI is decoupled from the storage mechanism.
         * It implements IndexedDB, but this class can be swapped out for a REST client
         * or SQL wrapper later.
         */
        class StorageService {
            constructor() {
                this.dbName = 'snookerDB';
                this.storeName = 'frames';
                this.db = null;
            }

            /**
             * Initialize the database
             */
            async init() {
                if (this.db) return;

                const request = indexedDB.open(this.dbName, 1);

                request.onupgradeneeded = (event) => {
                    this.db = event.target.result;
                    if (!this.db.objectStoreNames.contains(this.storeName)) {
                        this.db.createObjectStore(this.storeName, { keyPath: 'id', autoIncrement: true });
                    }
                };

                request.onsuccess = (event) => {
                    this.db = event.target.result;
                };

                request.onerror = (event) => {
                    console.error('Database error:', event.target.error);
                };
            }

            /**
             * Save a frame/shot record
             */
            async saveFrame(frameData) {
                await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readwrite');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.add(frameData);

                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            /**
             * Retrieve all history
             */
            async getHistory() {
                await this.init();
                return new Promise((resolve, reject) => {
                    const transaction = this.db.transaction([this.storeName], 'readonly');
                    const store = transaction.objectStore(this.storeName);
                    const request = store.getAll();

                    request.onsuccess = () => resolve(request.result.sort((a, b) => a.id - b.id)); // Oldest first
                    request.onerror = () => reject(request.error);
                });
            }
        }

        /**
         * Ball Definitions
         * 0: Cue (White - not potted)
         * 1: Red (1 point)
         * 2: Yellow (2)
         * 3: Green (3)
         * 4: Brown (4)
         * 5: Blue (5)
         * 6: Pink (6)
         * 7: Black (7)
         * 8: Color after 15 Reds (50 points)
         */
        const BALLS = [
            { id: 0, name: 'cue', value: 0, color: '#ffffff', isCue: true },
            { id: 1, name: 'red', value: 1, color: '#e74c3c', isRed: true },
            { id: 2, name: 'yellow', value: 2, color: '#f1c40f' },
            { id: 3, name: 'green', value: 3, color: '#2ecc71' },
            { id: 4, name: 'brown', value: 4, color: '#a0522d' }, // Updated brown color to match realistic wood/ball
            { id: 5, name: 'blue', value: 5, color: '#3498db' },
            { id: 6, name: 'pink', value: 6, color: '#e91e63' },
            { id: 7, name: 'black', value: 7, color: '#1a1a1a' },
            { id: 8, name: 'color', value: 50, color: '#34495e', isColor: true } // 50 pointer after last red
        ];

        const RED_BALLS_COUNT = 15;
        const COLOR_BALLS = [2, 3, 4, 5, 6, 7]; // Yellow to Black

        /**
         * Main Application Class
         */
        class SnookerApp {
            constructor() {
                // UI Elements
                this.currentTurn = 1; // Player 1 starts
                this.scoreP1 = 0;
                this.scoreP2 = 0;
                
                // Game State
                this.redsRemaining = RED_BALLS_COUNT;
                this.colorsRemaining = [...COLOR_BALLS];
                this.cueBallInHand = true;
                
                // Visual mapping of table positions (Simplified: We just track arrays of IDs)
                this.availableBalls = {}; // Simulated table state
                this.initializeBoard();

                this.loadHistory();
                this.renderBallSelector();
                this.hideStartScreen();
            }

            initializeBoard() {
                // Reset available balls to initial state (for a fresh start)
                // In a real app, this would be loaded from DB or calculated from position
                this.availableBalls = {
                    cue: { id: 0, ...BALLS[0] },
                    reds: Array.from({length: RED_BALLS_COUNT}, (_, i) => ({ id: 1, ...BALLS[1], pos: i })),
                    yellows: [{ id: 2, ...BALLS[2] }],
                    greens: [{ id: 3, ...BALLS[3] }],
                    browns: [{ id: 4, ...BALLS[4] }],
                    blues: [{ id: 5, ...BALLS[5] }],
                    pinks: [{ id: 6, ...BALLS[6]
                    blacks: [{ id: 7, ...BALLS[7] }]
                };
            }

            hideStartScreen() {
                const start = document.getElementById('start-screen');
                start.style.opacity = '0';
                start.style.pointerEvents = 'none';
                start.style.transition = 'opacity 0.5s';
            }

            async initGame() {
                const p1 = document.getElementById('p1').value;
                const p2 = document.getElementById('p2').value;
                
                document.getElementById('p1-display').innerText = p1;
                document.getElementById('p2-display').innerText = p2;
                document.getElementById('current-turn-name').innerText = p1;

                this.scoreP1 = 0;
                this.scoreP2 = 0;
                this.currentTurn = 1;
                this.redsRemaining = RED_BALLS_COUNT;
                this.colorsRemaining = [...COLOR_BALLS];
                this.cueBallInHand = true;
                this.initializeBoard(); // Reset visual board

                this.updateScoreDisplay();
                this.renderTable();
                this.updateBallOnStickText();
                this.addLog(`Game Started: ${p1} vs ${p2}`);

                // Save initial state
                await this.saveCurrentState();
            }

            /**
             * Render the main table visualization
             */
            renderTable() {
                const container = document.getElementById('table-container');
                container.innerHTML = ''; // Clear previous

                // Simple background
                container.style.background = 'linear-gradient(135deg, #2c3e50, #34495e)';

                // We are rendering a simplified 2D representation of the table 
                // with 3D-styled balls based on the "available balls" logic.
                // For simplicity, we just render the current ball on stick and a sample of others.
                // A full 3D table render would be significantly larger code.
                
                // For this demo, we show a mini-visual aid or just clear space.
                // Let's just put the balls on the table.
                const ballContainer = document.createElement('div');
                ballContainer.style.position = 'relative';
                ballContainer.style.width = '100%';
                ballContainer.style.height = '100%';
                ballContainer.style.display = 'flex';
                ballContainer.style.alignItems = 'center';
                ballContainer.style.justifyContent = 'center';
                
                // Visual Aid: Draw a rough triangle for reds
                const triangle = document.createElement('div');
                triangle.style.position = 'absolute';
                triangle.style.width = '200px';
                triangle.style.height = '180px';
                triangle.style.background = 'radial-gradient(circle, rgba(255,255,255,0.1), transparent)';
                triangle.style.borderRadius = '50%';
                triangle.style.zIndex = '0';
                
                // Add some static balls visually to make it feel like a table
                // We won't map exact coordinates for 22 balls here for brevity, 
                // but we will allow clicking balls in the sidebar.
                
                container.appendChild(ballContainer);
                
                // Update the sidebar visuals to reflect the table
                this.updateBallSelectorFromState();
            }

            /**
             * Populate the control buttons for available balls
             */
            renderBallSelector() {
                const selector = document.getElementById('ball-selector');
                selector.innerHTML = '';
                
                // Add cue ball button
                const cueBtn = this.createBallButton(0);
                cueBtn.style.backgroundImage = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'><circle cx=\'12\' cy=\'12\' r=\'10\' stroke=\'%23999\' stroke-width=\'2\' fill=\'white\'/></svg>")';
                cueBtn.title = "Cue Ball (Not potted)";
                cueBtn.onclick = () => this.processShot(0);
                selector.appendChild(cueBtn);

                // Add Reds
                if (this.redsRemaining > 0) {
                    const redBtn = this.createBallButton(1);
                    redBtn.style.backgroundImage = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'24\' height=\'24\' viewBox=\'0 0 24 24\' fill=\'%23e74c3c\' stroke=\'none\'><circle cx=\'12\' cy=\'12\' r=\'10\'/></svg>")';
                    redBtn.title = `Red Ball (${this.redsRemaining} left)`;
                    redBtn.onclick = () => this.processShot(1);
                    selector.appendChild(redBtn);
                }

                // Add Colors (only if reds are gone or available)
                this.colorsRemaining.sort((a,b) => a - b);
                this.colorsRemaining.forEach(colorId => {
                    const color = BALLS.find(b => b.id === colorId);
                    if (color) {
                        const btn = this.createBallButton(colorId);
                        const value = color.id === 8 ? 50 : color.value;
                        btn.style.backgroundImage = `url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='${color.color}' stroke='${color.color}' stroke-width='1'><circle cx='12' cy='12' r='10' fill='${color.color}'/></svg>")`;
                        btn.title = `${color.name} Ball (${value} points)`;
                        btn.onclick = () => this.processShot(colorId);
                        selector.appendChild(btn);
                    }
                });
                
                // Visual feedback for ball "on stick"
                this.updateBallSelectorFromState();
            }

            createBallButton(ballId) {
                const btn = document.createElement('button');
                btn.className = 'btn-ball';
                btn.dataset.id = ballId;
                // We will apply specific styles via JS or CSS based on the type
                return btn;
            }

            /**
             * Update the selector to show the ball on stick
             */
            updateBallSelectorFromState() {
                const btns = document.querySelectorAll('.btn-ball');
                btns.forEach(btn => {
                    btn.classList.remove('potted');
                });

                // Highlight the specific ball on stick if it exists in the selector
                // In this simplified UI, the player clicks the ball value, so this is just visual feedback
                // For now, we keep it simple.
            }

            updateBallOnStickText() {
                // Logic: 
                // If last shot was red -> Ball on table is a color
                // If last shot was color -> Ball in hand anywhere (Cue ball action)
                // But for this app, we simulate "Ball on stick" logic.
                // We will assume the app implies that the user enters what *he potted*.
                // The "ball on stick" is a heuristic to help the user know what to enter NEXT.
                
                let text = "Ball on Stick: NONE";
                let colorName = "";

                if (this.redsRemaining < RED_BALLS_COUNT) {
                    // Red was potted -> Next ball on table is a Color
                    if (this.colorsRemaining.length > 0) {
                        colorName = BALLS.find(b => b.id === this.colorsRemaining[0]).name;
                        text = `Ball on Stick: ${colorName} (${BALLS.find(b=>b.id===this.colorsRemaining[0]).value} pts)`;
                    } else {
                        // All colors potted -> No ball on table
                        text = "Ball on Stick: NONE (All colors potted)";
                    }
                } else {
                    // If reds are still up, ball on table is a random red (in real game, the red played).
                    // We just say "Any Red" or pick the "closest" one.
                    if (this.redsRemaining > 0) {
                        text = `Ball on Stick: RED (${1} pts)`;
                    }
                }
                
                document.getElementById('current-ball-on-stick').innerText = text;
            }

            async processShot(ballId) {
                if (!ballId) return;

                const ball = BALLS.find(b => b.id === ballId);
                if (!ball || ball.isCue) return; // Can't score on cue ball (unless scratch, but we ignore scratches for simplicity here)

                // Validation Logic
                let points = 0;
                let validShot = false;
                let shotType = '';

                if (ball.isRed) {
                    if (this.redsRemaining > 0) {
                        points = ball.value;
                        validShot = true;
                        this.redsRemaining--;
                        shotType = 'Red Pot';
                    } else {
                        alert("No reds left to pot.");
                        return;
                    }
                } else if (ball.id === 8) {
                    // The 50-pointer (this is a simplified representation)
                    // In real snooker, this is only legal if all colors are available.
                    if (this.colorsRemaining.length === 0 && this.redsRemaining === 0) {
                         points = ball.value;
                         validShot = true;
                         shotType = 'Black (50)';
                    } else {
                        alert("You can't get the 50-pointer yet.");
                        return;
                    }
                } else if (this.colorsRemaining.includes(ball.id)) {
                    points = ball.value;
                    validShot = true;
                    this.colorsRemaining = this.colorsRemaining.filter(id => id !== ball.id);
                    shotType = `Color: ${ball.name}`;
                } else {
                    alert(`This ball (${ball.name}) is not on the table.`);
                    return;
                }

                // If valid, update scores
                if (validShot) {
                    const currentScorer = this.currentTurn === 1 ? 'P1' : 'P2';
                    if (this.currentTurn === 1) {
                        this.scoreP1 += points;
                    } else {
                        this.scoreP2 += points;
                    }

                    // Log it
                    const potDesc = ball.name.charAt(0).toUpperCase() + ball.name.slice(1);
                    this.addLog(`${currentScorer} potted ${potDesc} (+${points} pts)`);
                    
                    // Save to DB
                    await this.saveCurrentState();

                    // Update UI
                    this.updateScoreDisplay();
                    
                    // Switch Turn?
                    // In Snooker: If you pot a color after a red, you play again.
                    // If you pot a color after another color (i.e. failed to pot red)? 
                    // Simplified rule: Always switch turn for this demo.
                    // For realism, if ball is color (and not red), switch turn to opponent.
                    // If ball is red, switch turn to opponent.
                    this.currentTurn = this.currentTurn === 1 ? 2 : 1;
                    this.cueBallInHand = true; // Simplified: Ball always in hand after a shot in this UI
                    this.updateBallOnStickText();

                    this.renderTable();
                    this.renderBallSelector();
                }
            }

            addLog(message) {
                const logDiv = document.getElementById('history-log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const time = new Date().toLocaleTimeString();
                entry.innerHTML = `<span style="color: #999;">[${time}]</span> ${message}`;
                logDiv.appendChild(entry);
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            updateScoreDisplay() {
                document.getElementById('score-p1').innerText = this.scoreP1;
                document.getElementById('score-p2').innerText = this.scoreP2;
                
                // Update turn indicator
                const names = document.querySelectorAll('.player-label');
                document.getElementById('current-turn-name').innerText = (this.currentTurn === 1) ? names[0].innerText : names[1].innerText;
            }

            async saveCurrentState() {
                const frameData = {
                    timestamp: new Date().toISOString(),
                    player1_score: this.scoreP1,
                    player2_score: this.scoreP2,
                    turn: this.currentTurn,
                    reds_remaining: this.redsRemaining,
                    colors_remaining: this.colorsRemaining,
                    // Note: We don't store the exact visual positions in this simple example, 
                    // but for a full app, we would serialize the table geometry here.
                };
                
                try {
                    await storage.saveFrame(frameData);
                    console.log("State saved to DB.");
                } catch (e) {
                    console.error("Failed to save state", e);
                }
            }

            async loadHistory() {
                try {
                    const history = await storage.getHistory();
                    const logDiv = document.getElementById('history-log');
                    history.forEach(entry => {
                        // Prevent duplicate logs if page refreshes during a live game
                        // For simplicity, we just log the events
                        const line = document.createElement('div');
                        line.className = 'log-entry';
                        line.innerHTML = `<span style="color: #999;">[${new Date(entry.timestamp).toLocaleTimeString()}]</span> LOADED: F1:${entry.player1_score} F2:${entry.player2_score}`;
                        logDiv.appendChild(line);
                    });
                } catch(e) {
                    console.error(e);
                }
            }
        }

        // Initialize Storage Singleton and App
        const storage = new StorageService();
        const app = new SnookerApp();

    </script>
</body>
</html>
